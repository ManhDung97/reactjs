<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="chan">So Chan</p>
    <button onclick="soChan()">Số chẵn</button>

    <p id="number"></p>
    <button onclick="number()">Số nguyên tố</button>

    <script>

        chanE = document.getElementById("chan");
        function soChan()
        {
            text = "Các số chẵn từ 0 đến 10 là:";
            var num = "";
            for (var i = 0; i<=10; i++){
                if(i %2 == 0){
                    num += i + " ";
                }
            }
            chanE.innerHTML = text + "" + num;
        }

        numberE = document.getElementById("number");

    function number()
    {
        text = "Các số nguyên tố từ 0 đến 50 là:";
        var num = "";
        for (var n = 2; n<=50; n++){
            var count = 0;
            for(i = 2; i<n; i++){
                if (n % i == 0){
                    count++;
                }
            }
            if (count == 0){
                num += i + " ";
            }
        }
        numberE.innerHTML = text + num;
    }
    </script>
</body>
</html>
