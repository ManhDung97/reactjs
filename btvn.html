<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        table{
            border: 1px solid black;
            width: 190px;
        }
        thead,th,td{
            border: 1px solid black;
        }
    </style>
  </head>
  <body>
    <p>bảng danh sách lớp</p>
    <button onclick="list()">click</button>
    <table  id="table" style="display: none;">
      <thead>
        <th>Tên</th>
        <th>Lớp</th>
        <th>Điểm số</th>
      </thead>
      <tbody >
        <tr>
          <td class="username"></td>
          <td class="classE"></td>
          <td class="point"></td>
        </tr>
        <tr>
          <td class="username"></td>
          <td class="classE"></td>
          <td class="point"></td>
        </tr>
        <tr>
          <td class="username"></td>
          <td class="classE"></td>
          <td class="point"></td>
        </tr>
        <tr>
          <td class="username"></td>
          <td class="classE"></td>
          <td class="point"></td>
        </tr>
      </tbody>
    </table>
    <script>
      username = document.getElementsByClassName("username");
      classE = document.getElementsByClassName("classE");
      point = document.getElementsByClassName("point");
      table = document.getElementById("table");
      student = [
        ["mạnh dũng", "reactjs", 9],
        ["tuấn tú", "reactjs", 10],
        ["tiến quang", "reactjs", 8],
        ["hùng dũng", "reactjs", 9],
      ];
      function list() {
        for (let i = 0; i < student.length; i++) {
          username[i].innerText = student[i][0];
          classE[i].innerText = student[i][1];
          point[i].innerText = student[i][2];
        }
        table.style = "display:block";
      }
    </script>
  </body>
</html>
